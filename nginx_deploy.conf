# 当前文件用于生产环境 Nginx 部署本项目的 Next.js 服务。
# 使用方式通常是将本文件复制或软链接到 /etc/nginx/conf.d/nginx_deploy.conf，
# 然后执行 nginx -t 校验配置，确认无误后再 reload Nginx。

# 根据客户端是否发起协议升级，自动设置反向代理的 Connection 头。
# 这可以兼容 Next.js 可能使用到的 WebSocket、热更新通道或其他升级连接。
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# Next.js 生产服务地址。
# 项目当前通过 PORT=13100 bun run start 启动，因此 Nginx 只需要代理到本机端口。
upstream yx_nextjs {
    server 127.0.0.1:13100;
    keepalive 32;
}

server {
    listen 80;
    server_name www.yxwriting.com;

    # 所有 HTTP 请求统一跳转到 HTTPS，保留原始域名、路径和查询参数。
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.yxwriting.com;

    # ===== SSL 证书 =====
    # 这里沿用 Certbot/Let's Encrypt 默认生成的证书路径。
    ssl_certificate /etc/letsencrypt/live/www.yxwriting.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.yxwriting.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ===== 上传大小限制 =====
    # Next.js API Route、Server Action、头像上传、文档导出等请求都会经过这里。
    client_max_body_size 50m;

    # ===== 基础反向代理设置 =====
    # 这些变量集中定义，避免不同 location 中重复配置时出现不一致。
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # 登录、导出、长请求和流式响应可能需要更长等待时间。
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ===== Next.js 构建静态资源缓存 =====
    # /_next/static/ 下的文件通常带有内容哈希，可以长期缓存。
    location /_next/static/ {
        proxy_pass http://yx_nextjs;

        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ===== 全站请求交给 Next.js =====
    # Next.js 负责处理页面路由、/api/* 接口、/_next/* 资源和 public 目录文件。
    # 这里不再配置 root / dist，也不再单独代理 /api/v1/ 到旧后端。
    location / {
        proxy_pass http://yx_nextjs;

        # 关闭代理缓冲后，日志、下载、导出和流式响应会更及时到达浏览器。
        proxy_buffering off;
    }
}
